<!DOCTYPE html>

<head>

<title>Effica Automation — OBS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif;}
body{background:#F8FAFC;min-height:100vh;padding-bottom:60px;}
.banner{background:linear-gradient(135deg,#122747 0%,#1B3A6B 60%,#2952A0 100%);padding:28px 24px 24px;text-align:center;position:relative;overflow:hidden;}
.banner-circle1{position:absolute;top:-30px;right:-30px;width:140px;height:140px;border-radius:50%;background:rgba(200,150,46,.2);}
.banner-circle2{position:absolute;bottom:-20px;left:-20px;width:100px;height:100px;border-radius:50%;background:rgba(200,150,46,.15);}
.banner-inner{position:relative;z-index:1;}
.banner-tag{font-size:11px;font-weight:700;color:#C8962E;letter-spacing:3px;margin-bottom:8px;}
.banner-title{font-size:22px;font-weight:800;color:#fff;}
.banner-sub{font-size:14px;color:rgba(255,255,255,.65);margin-top:4px;}
.banner-save{margin-top:10px;display:flex;align-items:center;justify-content:center;gap:6px;}
.save-dot{width:8px;height:8px;border-radius:50%;background:#4ADE80;box-shadow:0 0 6px #4ADE80;}
.save-txt{font-size:12px;color:rgba(255,255,255,.65);font-weight:500;}
.stats{display:flex;justify-content:center;gap:14px;margin-top:16px;flex-wrap:wrap;}
.stat{background:rgba(255,255,255,.12);border-radius:12px;padding:10px 18px;border:1px solid rgba(255,255,255,.18);}
.stat-val{font-size:20px;font-weight:800;color:#C8962E;}
.stat-lbl{font-size:11px;color:rgba(255,255,255,.65);font-weight:600;}
.chart{display:flex;flex-direction:column;align-items:center;padding:32px 16px;}
.gm-card{background:linear-gradient(135deg,#122747,#1B3A6B);border-radius:16px;padding:16px 28px;display:flex;align-items:center;gap:16px;cursor:pointer;box-shadow:0 6px 24px rgba(27,58,107,.5);border:2px solid rgba(255,255,255,.12);transition:transform .2s;}

.gm-avatar{width:46px;height:46px;border-radius:50%;background:#C8962E;color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0;}

.dept-wrap{display:flex;flex-direction:column;align-items:center;width:100%;}
.dept-card{position:relative;display:flex;align-items:stretch;border-radius:16px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.08);border:1.5px solid #E5E7EB;width:320px;transition:all .2s;}
.dept-card:hover{transform:translateY(-2px);}
.dept-accent{width:7px;flex-shrink:0;}
.dept-body{flex:1;padding:14px 16px;cursor:pointer;background:#fff;}
.dept-row{display:flex;align-items:center;gap:12px;}
.dept-num{width:42px;height:42px;border-radius:10px;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;flex-shrink:0;}
.dept-name{font-weight:700;font-size:16px;color:#111827;}
.dept-meta{font-size:13px;color:#9CA3AF;margin-top:2px;}
.dept-arr{font-size:18px;opacity:.4;transition:opacity .2s;}
.dept-card:hover .dept-arr{opacity:1;}
.dept-edit{background:#F9FAFB;border:none;border-left:1px solid #F3F4F6;padding:0 16px;cursor:pointer;font-size:18px;color:#9CA3AF;transition:all .2s;}
.vconn{width:2px;height:18px;background:linear-gradient(180deg,#CBD5E1,#94A3B8);margin:0 auto;}
.hconn{position:absolute;top:0;height:2px;background:#CBD5E1;}
.role-row{position:relative;display:flex;gap:0;align-items:flex-start;justify-content:center;}
.group-col{display:flex;flex-direction:column;align-items:center;margin:0 8px;}
.group-lbl{font-size:11px;font-weight:700;color:#9CA3AF;letter-spacing:.5px;margin-bottom:6px;background:#F3F4F6;border-radius:20px;padding:2px 10px;}
.type-row{display:flex;flex-direction:column;align-items:center;}
.role-siblings{position:relative;display:flex;gap:6px;justify-content:center;}
.role-box{border:2px solid #E5E7EB;border-radius:12px;padding:8px 14px;cursor:pointer;transition:all .15s;text-align:center;min-width:110px;max-width:150px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.role-box:hover{box-shadow:0 4px 12px rgba(0,0,0,.1);}
.role-icon{font-size:14px;}
.role-title{font-size:13px;font-weight:700;color:#1F2937;line-height:1.3;margin-top:2px;}
.role-name{font-size:11px;color:#9CA3AF;margin-top:2px;}
.no-roles{font-size:13px;color:#9CA3AF;padding:10px 0;font-style:italic;}
.bottom-btns{margin-top:28px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.add-dept-btn{background:#fff;border:2px dashed rgba(27,58,107,.5);border-radius:14px;padding:14px 28px;font-size:15px;font-weight:700;color:#1B3A6B;cursor:pointer;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.06);transition:all .2s;}
.add-dept-btn:hover{border-color:#C8962E;color:#C8962E;}
.reset-btn{background:#FEF2F2;border:2px solid #FCA5A5;border-radius:14px;padding:14px 20px;font-size:14px;font-weight:700;color:#DC2626;cursor:pointer;display:flex;align-items:center;gap:8px;}
.legend{margin-top:32px;background:#fff;border-radius:14px;padding:16px 24px;box-shadow:0 2px 10px rgba(0,0,0,.06);display:flex;gap:16px;flex-wrap:wrap;justify-content:center;}
.leg-item{display:flex;align-items:center;gap:6px;font-size:13px;color:#6B7280;font-weight:500;}
.leg-swatch{width:13px;height:13px;border-radius:3px;border:1.5px solid;}
/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;z-index:9999;background:#111827;color:#fff;border-radius:12px;padding:12px 20px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(0,0,0,.25);opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
/* OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1500;backdrop-filter:blur(4px);}
.modal{background:#fff;border-radius:20px;width:480px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.22);}
.modal-hdr{background:linear-gradient(135deg,#122747,#1B3A6B);border-radius:20px 20px 0 0;padding:22px 26px;display:flex;justify-content:space-between;align-items:center;}
.modal-hdr-title{color:#fff;font-weight:700;font-size:17px;}
.modal-close{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;}
.modal-body{padding:26px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:13px;font-weight:700;color:#374151;margin-bottom:7px;text-transform:capitalize;}
.field input,.field textarea,.field select{width:100%;border:1.5px solid #E5E7EB;border-radius:10px;padding:11px 14px;font-size:15px;color:#111827;font-family:inherit;outline:none;box-sizing:border-box;transition:border .2s;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:#1B3A6B;}
.field textarea{resize:vertical;min-height:72px;}
.type-pills{display:flex;gap:8px;flex-wrap:wrap;}
.type-pill{padding:7px 14px;border-radius:20px;font-size:13px;cursor:pointer;font-weight:600;transition:all .15s;border:1.5px solid #E5E7EB;background:#F9FAFB;color:#6B7280;}
.color-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;}
.color-swatch{width:32px;height:32px;border-radius:50%;cursor:pointer;transition:transform .15s;}
.btn-row{display:flex;gap:10px;margin-top:20px;}
.btn-primary{flex:1;background:linear-gradient(135deg,#1B3A6B,#2952A0);color:#fff;border:none;border-radius:10px;padding:13px 0;font-size:15px;font-weight:700;cursor:pointer;}
.btn-secondary{flex:1;background:#F3F4F6;color:#374151;border:none;border-radius:10px;padding:13px 0;font-size:15px;cursor:pointer;}
.btn-danger{flex:1;background:#DC2626;color:#fff;border:none;border-radius:10px;padding:12px 0;font-size:15px;font-weight:700;cursor:pointer;}
/* DEPT PANEL */
.panel{background:#fff;border-radius:20px;width:580px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.22);}
.panel-hdr{border-radius:20px 20px 0 0;padding:24px 28px;}
.panel-top{display:flex;justify-content:space-between;align-items:flex-start;}
.panel-num{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:20px;}
.panel-title{font-size:22px;font-weight:800;color:#111827;}
.panel-sub{font-size:13px;color:#6B7280;margin-top:2px;}
.panel-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.panel-body{padding:24px 28px;}
.stat-chips{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;}
.stat-chip{background:#fff;border-radius:10px;padding:8px 16px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.stat-chip-val{font-size:20px;font-weight:800;}
.stat-chip-lbl{font-size:11px;color:#9CA3AF;font-weight:700;}
.desc-box{background:#F8FAFC;border-radius:12px;padding:14px 18px;margin-bottom:16px;font-size:14px;color:#374151;line-height:1.7;}
.target-box{background:rgba(200,150,46,.15);border:1px solid rgba(200,150,46,.4);border-radius:12px;padding:12px 18px;margin-bottom:22px;display:flex;align-items:center;gap:12px;}
.add-pos-btn{width:100%;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:22px;display:flex;align-items:center;justify-content:center;gap:8px;box-sizing:border-box;}
.group-section{margin-bottom:22px;}
.group-divider{font-size:12px;font-weight:700;color:#9CA3AF;letter-spacing:1.5px;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.divider-line{flex:1;height:1px;background:#F3F4F6;}
.role-list-item{display:flex;align-items:center;justify-content:space-between;background:#FAFAFA;border:1px solid #F3F4F6;border-radius:12px;padding:12px 16px;margin-bottom:8px;transition:all .15s;}
.role-item-left{display:flex;align-items:center;gap:10px;}
.role-item-icon{width:38px;height:38px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0;}
.role-item-title{font-size:14px;font-weight:700;color:#111827;}
.role-item-name{font-size:12px;color:#6B7280;margin-top:1px;}
.role-item-badge{display:inline-block;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:600;margin-top:4px;}
.role-item-btns{display:flex;gap:8px;}
.confirm-box{background:#fff;border-radius:16px;padding:28px;width:340px;text-align:center;box-shadow:0 16px 48px rgba(0,0,0,.2);}
</style>
</head>
<body>

<div class="banner">
  <div class="banner-circle1"></div>
  <div class="banner-circle2"></div>
  <div class="banner-inner">
    <div class="banner-tag">EA-HR-SBP-001 v2.0</div>
    <div class="banner-title">Effica Automation</div>
    <div class="banner-sub">Organisational Breakdown Structure (OBS)</div>
    <div class="banner-save">
      <div class="save-dot"></div>
      <span class="save-txt">Auto-saved to this browser · edits survive refresh</span>
    </div>
    <div class="stats" id="stats"></div>
  </div>
</div>

<div class="chart" id="chart"></div>

<div class="toast" id="toast">✅ Changes saved automatically</div>

<!-- Overlays rendered by JS -->
<div id="overlays"></div>

<script>
const NAVY="#1B3A6B",GOLD="#C8962E",NAVY2="#122747";
const STORAGE_KEY="effica_obs_v1";

const TYPE_CFG={
  tl:{bg:"#F0EFFE",border:"#7C6FF5",text:"#4338CA",label:"Team Lead / HOD",icon:"👑",order:0},
  sr:{bg:"#FEF3C7",border:"#D97706",text:"#92400E",label:"Senior",icon:"⭐",order:1},
  jr:{bg:"#D1FAE5",border:"#059669",text:"#065F46",label:"Junior",icon:"🔵",order:2},
  tr:{bg:"#F3F4F6",border:"#9CA3AF",text:"#374151",label:"Trainee",icon:"🟢",order:3},
  reg:{bg:"#FCE7F3",border:"#DB2777",text:"#9D174D",label:"Region",icon:"📍",order:1},
};

const DEPT_COLORS=["#D946EF","#3B82F6","#F59E0B","#10B981","#EF4444","#8B5CF6","#06B6D4","#F97316"];

const DEFAULT_DATA={
  gm:{role:"General Manager",name:"K. Rohith Saravanakumar"},
  departments:[
    {id:"sales",num:"01",label:"Sales",headcount:3,color:"#D946EF",description:"Collects customer requirements across 3 regions and passes qualified leads to Application.",weeklyTarget:"16 leads / week",roles:[
      {id:"s1",type:"reg",role:"Sales Executive",name:"Coimbatore Region",group:"Regions"},
      {id:"s2",type:"reg",role:"Sales Executive",name:"Chennai Region",group:"Regions"},
      {id:"s3",type:"reg",role:"Sales Executive",name:"Hosur Region",group:"Regions"},
    ]},
    {id:"application",num:"02",label:"Application",headcount:6,color:"#3B82F6",description:"Converts Sales inputs into design-ready technical briefs for all 3 regions.",weeklyTarget:"16 briefs / week",roles:[
      {id:"a1",type:"tl",role:"Team Lead",name:"",group:"Leadership"},
      {id:"a2",type:"jr",role:"Junior AE",name:"",group:"Junior"},
      {id:"a3",type:"tr",role:"Trainee AE",name:"",group:"Trainees"},
      {id:"a4",type:"tr",role:"Trainee AE",name:"",group:"Trainees"},
      {id:"a5",type:"tr",role:"Trainee AE",name:"",group:"Trainees"},
      {id:"a6",type:"tr",role:"Trainee AE",name:"",group:"Trainees"},
    ]},
    {id:"design",num:"03",label:"Design",headcount:9,color:"#F59E0B",description:"Chain bottleneck — sets the throughput ceiling at 16 projects/week.",weeklyTarget:"16 projects / week · 8 active × 2 each",roles:[
      {id:"d1",type:"tl",role:"HOD (Design)",name:"",group:"Leadership"},
      {id:"d2",type:"sr",role:"Senior Designer",name:"",group:"Senior"},
      {id:"d3",type:"sr",role:"Senior Designer",name:"",group:"Senior"},
      {id:"d4",type:"sr",role:"Senior Designer",name:"",group:"Senior"},
      {id:"d5",type:"jr",role:"Junior Designer",name:"",group:"Junior"},
      {id:"d6",type:"jr",role:"Junior Designer",name:"",group:"Junior"},
      {id:"d7",type:"jr",role:"Junior Designer",name:"",group:"Junior"},
      {id:"d8",type:"tr",role:"Trainee",name:"",group:"Trainees"},
      {id:"d9",type:"tr",role:"Trainee",name:"",group:"Trainees"},
    ]},
    {id:"development",num:"04",label:"Development",headcount:6,color:"#10B981",description:"Converts approved designs into build-ready packages. Large surplus capacity.",weeklyTarget:"16 projects / week · max 36 capacity",roles:[
      {id:"dv1",type:"tl",role:"Team Lead",name:"",group:"Leadership"},
      {id:"dv2",type:"sr",role:"Senior Dev",name:"",group:"Senior"},
      {id:"dv3",type:"sr",role:"Senior Dev",name:"",group:"Senior"},
      {id:"dv4",type:"sr",role:"Senior Dev",name:"",group:"Senior"},
      {id:"dv5",type:"jr",role:"Junior Dev",name:"",group:"Junior"},
      {id:"dv6",type:"tr",role:"Trainee",name:"",group:"Trainees"},
    ]},
    {id:"manufacturing",num:"05",label:"Manufacturing",headcount:22,color:"#EF4444",description:"Two parallel teams of 11, each with 2 sub-groups of 5.",weeklyTarget:"16 projects / week · 4 sub-groups × 4 each",roles:[
      {id:"m1",type:"tl",role:"Team Lead A",name:"",group:"Team A"},
      {id:"m2",type:"sr",role:"Sub-Group A1",name:"5 members",group:"Team A"},
      {id:"m3",type:"sr",role:"Sub-Group A2",name:"5 members",group:"Team A"},
      {id:"m4",type:"tl",role:"Team Lead B",name:"",group:"Team B"},
      {id:"m5",type:"sr",role:"Sub-Group B1",name:"5 members",group:"Team B"},
      {id:"m6",type:"sr",role:"Sub-Group B2",name:"5 members",group:"Team B"},
    ]},
    {id:"installation",num:"06",label:"Installation",headcount:23,color:"#8B5CF6",description:"Final chain link — distributed across 3 regions with 6 active site teams.",weeklyTarget:"16 projects / week · CBE: 6, CHN: 5, HSR: 5",roles:[
      {id:"i0",type:"tl",role:"Team Lead (HQ)",name:"",group:"HQ"},
      {id:"i1",type:"sr",role:"CBE-1",name:"Sr×2 + Jr×4",group:"Coimbatore"},
      {id:"i2",type:"sr",role:"CBE-2",name:"Sr×2 + Jr×4",group:"Coimbatore"},
      {id:"i3",type:"sr",role:"CHN-1",name:"Sr×1 + Jr×2 + Tr×1",group:"Chennai"},
      {id:"i4",type:"sr",role:"CHN-2",name:"Sr×1 + Jr×1 + Tr×1",group:"Chennai"},
      {id:"i5",type:"sr",role:"HSR-1",name:"Sr×1 + Jr×1 + Tr×1",group:"Hosur"},
      {id:"i6",type:"sr",role:"HSR-2",name:"Sr×1 + Jr×1",group:"Hosur"},
      {id:"i7",type:"jr",role:"Floating Backup",name:"Sr×1 + Tr×1",group:"Floating"},
    ]},
  ]
};

let data=JSON.parse(localStorage.getItem(STORAGE_KEY)||"null")||JSON.parse(JSON.stringify(DEFAULT_DATA));
let idSeq=5000;
const uid=()=>`r${++idSeq}`;

function save(){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
  const t=document.getElementById("toast");
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2500);
}

function initials(name){return(name||"").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase()||"—";}

/* ── RENDER STATS ── */
function renderStats(){
  const total=data.departments.reduce((s,d)=>s+d.headcount,0);
  document.getElementById("stats").innerHTML=
    [[total,"People"],[data.departments.length,"Departments"],["3","Regions"],["16","Projects/Wk"]]
    .map(([v,l])=>`<div class="stat"><div class="stat-val">${v}</div><div class="stat-lbl">${l}</div></div>`).join("");
}

/* ── HIERARCHY TREE ── */
function buildTree(dept){
  const roles=dept.roles;
  if(!roles.length) return `<div class="no-roles">No positions — open dept panel to add</div>`;
  const byGroup={};
  roles.forEach(r=>{const g=r.group||"Members";if(!byGroup[g])byGroup[g]=[];byGroup[g].push(r);});
  const groupRank=g=>Math.min(...byGroup[g].map(r=>TYPE_CFG[r.type]?.order??9));
  const sorted=Object.keys(byGroup).sort((a,b)=>groupRank(a)-groupRank(b));
  const soloGroups=sorted.filter(g=>byGroup[g].every(r=>r.type==="tl")||byGroup[g].length===1);
  const leafGroups=sorted.filter(g=>!soloGroups.includes(g));
  let html="";
  soloGroups.forEach(g=>{
    html+=`<div class="vconn"></div><div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;">`;
    byGroup[g].forEach(r=>{html+=roleBoxHTML(r,dept.id);});
    html+=`</div>`;
  });
  if(leafGroups.length>0){
    html+=`<div class="vconn"></div>`;
    html+=`<div class="role-row" style="align-items:flex-start;">`;
    if(leafGroups.length>1) html+=`<div class="hconn" style="left:60px;right:60px;"></div>`;
    leafGroups.forEach(g=>{
      const sortedRoles=[...byGroup[g]].sort((a,b)=>(TYPE_CFG[a.type]?.order??9)-(TYPE_CFG[b.type]?.order??9));
      const typeRows=[];let cur=null;
      sortedRoles.forEach(r=>{if(!cur||cur.type!==r.type){cur={type:r.type,items:[r]};typeRows.push(cur);}else cur.items.push(r);});
      html+=`<div class="group-col">`;
      html+=`<div class="vconn"></div>`;
      if(leafGroups.length>1) html+=`<div class="group-lbl">${g}</div>`;
      typeRows.forEach(row=>{
        html+=`<div class="type-row"><div class="role-siblings" style="position:relative;">`;
        if(row.items.length>1) html+=`<div class="hconn" style="left:30px;right:30px;"></div>`;
        row.items.forEach(r=>{
          html+=`<div style="display:flex;flex-direction:column;align-items:center;">`;
          if(row.items.length>1) html+=`<div class="vconn" style="height:14px;"></div>`;
          html+=roleBoxHTML(r,dept.id);
          html+=`</div>`;
        });
        html+=`</div><div class="vconn" style="height:10px;"></div></div>`;
      });
      html+=`</div>`;
    });
    html+=`</div>`;
  }
  return html;
}

function roleBoxHTML(r,deptId){
  const s=TYPE_CFG[r.type]||TYPE_CFG.tr;
  return `<div class="role-box" onclick="openEditRole('${deptId}','${r.id}')" style="border-color:#E5E7EB;" onmouseover="this.style.background='${s.bg}';this.style.borderColor='${s.border}';" onmouseout="this.style.background='#fff';this.style.borderColor='#E5E7EB';">
    <div class="role-icon">${s.icon}</div>
    <div class="role-title" style="color:#1F2937;">${r.role}</div>
    ${r.name?`<div class="role-name">${r.name}</div>`:""}
  </div>`;
}

/* ── RENDER CHART ── */
function render(){
  renderStats();
  const gmInit=initials(data.gm.name);
  let html=`<div class="gm-card" onclick="openEditGM()">
    <div class="gm-avatar">${gmInit}</div>
    <div><div class="gm-role">GENERAL MANAGER</div><div class="gm-name">${data.gm.name}</div></div>
    <div style="font-size:14px;color:rgba(255,255,255,.4);margin-left:10px;">✏️</div>
  </div>`;

  data.departments.forEach(dept=>{
    html+=`<div class="dept-wrap">
      <div class="chain-arrow"><div class="chain-vline"></div><div class="chain-circle">↓</div><div class="chain-vline"></div></div>
      <div class="dept-card" style="border-color:#E5E7EB;" onmouseover="this.style.boxShadow='0 8px 28px ${dept.color}40';this.style.borderColor='${dept.color}';" onmouseout="this.style.boxShadow='0 2px 10px rgba(0,0,0,.08)';this.style.borderColor='#E5E7EB';">
        <div class="dept-accent" style="background:linear-gradient(180deg,${dept.color},${dept.color}80);"></div>
        <div class="dept-body" onclick="openDeptPanel('${dept.id}')">
          <div class="dept-row">
            <div class="dept-num" style="background:linear-gradient(135deg,${dept.color},${dept.color}80);">${dept.num}</div>
            <div style="flex:1;">
              <div class="dept-name">${dept.label}</div>
              <div class="dept-meta">${dept.headcount} people · ${dept.roles.length} positions · tap to manage</div>
            </div>
            <div class="dept-arr" style="color:${dept.color};">▶</div>
          </div>
        </div>
        <button class="dept-edit" onclick="openEditDept('${dept.id}')" style="color:#9CA3AF;" onmouseover="this.style.color='${dept.color}';this.style.background='${dept.color}12';" onmouseout="this.style.color='#9CA3AF';this.style.background='#F9FAFB';">✏️</button>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;">${buildTree(dept)}</div>
    </div>`;
  });

  html+=`<div class="bottom-btns">
    <button class="add-dept-btn" onclick="openAddDept()">➕ Add New Department</button>
    <button class="reset-btn" onclick="resetData()">🔄 Reset to Default</button>
  </div>`;

  html+=`<div class="legend">`;
  Object.entries(TYPE_CFG).forEach(([k,s])=>{
    html+=`<div class="leg-item"><div class="leg-swatch" style="background:${s.bg};border-color:${s.border};"></div>${s.icon} ${s.label}</div>`;
  });
  html+=`</div>`;

  document.getElementById("chart").innerHTML=html;
}

function closeOverlay(){document.getElementById("overlays").innerHTML="";}

/* ── EDIT GM ── */
function openEditGM(){
  document.getElementById("overlays").innerHTML=`
  <div class="overlay" onclick="if(event.target===this)closeOverlay()">
    <div class="modal">
      <div class="modal-hdr"><span class="modal-hdr-title">✏️ Edit General Manager</span><button class="modal-close" onclick="closeOverlay()">×</button></div>
      <div class="modal-body">
        <div class="field"><label>Role Title</label><input id="gm_role" value="${data.gm.role}"/></div>
        <div class="field"><label>Name</label><input id="gm_name" value="${data.gm.name}"/></div>
        <div class="btn-row">
          <button class="btn-primary" onclick="saveGM()">Save Changes</button>
          <button class="btn-secondary" onclick="closeOverlay()">Cancel</button>
        </div>
      </div>
    </div>
  </div>`;
}
function saveGM(){
  data.gm.role=document.getElementById("gm_role").value.trim()||data.gm.role;
  data.gm.name=document.getElementById("gm_name").value.trim()||data.gm.name;
  save();render();closeOverlay();
}

/* ── EDIT DEPT ── */
function openEditDept(deptId){
  const d=data.departments.find(x=>x.id===deptId);
  document.getElementById("overlays").innerHTML=`
  <div class="overlay" onclick="if(event.target===this)closeOverlay()">
    <div class="modal">
      <div class="modal-hdr"><span class="modal-hdr-title">✏️ Edit Department</span><button class="modal-close" onclick="closeOverlay()">×</button></div>
      <div class="modal-body">
        <div class="field"><label>Department Name</label><input id="ed_label" value="${d.label}"/></div>
        <div class="field"><label>Description</label><textarea id="ed_desc">${d.description}</textarea></div>
        <div class="field"><label>Weekly Target</label><input id="ed_target" value="${d.weeklyTarget}"/></div>
        <div class="field"><label>Headcount</label><input id="ed_hc" type="number" value="${d.headcount}"/></div>
        <div class="btn-row">
          <button class="btn-primary" onclick="saveDept('${deptId}')">Save Changes</button>
          <button class="btn-secondary" onclick="closeOverlay()">Cancel</button>
        </div>
      </div>
    </div>
  </div>`;
}
function saveDept(deptId){
  const d=data.departments.find(x=>x.id===deptId);
  d.label=document.getElementById("ed_label").value.trim()||d.label;
  d.description=document.getElementById("ed_desc").value.trim()||d.description;
  d.weeklyTarget=document.getElementById("ed_target").value.trim()||d.weeklyTarget;
  d.headcount=+document.getElementById("ed_hc").value||d.headcount;
  save();render();closeOverlay();
}

/* ── EDIT ROLE ── */
function openEditRole(deptId,roleId){
  const r=data.departments.find(x=>x.id===deptId).roles.find(x=>x.id===roleId);
  const typePills=Object.entries(TYPE_CFG).map(([t,s])=>`<div class="type-pill" id="tp_${t}" onclick="selectType('${t}')" style="${r.type===t?`background:${s.bg};border-color:${s.border};color:${s.text};`:''}">${s.icon} ${s.label}</div>`).join("");
  document.getElementById("overlays").innerHTML=`
  <div class="overlay" onclick="if(event.target===this)closeOverlay()">
    <div class="modal">
      <div class="modal-hdr"><span class="modal-hdr-title">✏️ Edit Position</span><button class="modal-close" onclick="closeOverlay()">×</button></div>
      <div class="modal-body">
        <div class="field"><label>Designation / Role Title</label><input id="er_role" value="${r.role}"/></div>
        <div class="field"><label>Employee Name</label><input id="er_name" value="${r.name||''}"/></div>
        <div class="field"><label>Group</label><input id="er_group" value="${r.group||''}"/></div>
        <div class="field"><label>Role Type</label><div class="type-pills" id="type-pills">${typePills}</div></div>
        <input type="hidden" id="er_type" value="${r.type}"/>
        <div class="btn-row">
          <button class="btn-primary" onclick="saveRole('${deptId}','${roleId}')">Save Changes</button>
          <button class="btn-secondary" onclick="closeOverlay()">Cancel</button>
        </div>
      </div>
    </div>
  </div>`;
}
function selectType(t){
  document.getElementById("er_type").value=t;
  Object.entries(TYPE_CFG).forEach(([k,s])=>{
    const el=document.getElementById(`tp_${k}`);
    if(!el)return;
    if(k===t){el.style.background=s.bg;el.style.borderColor=s.border;el.style.color=s.text;}
    else{el.style.background="#F9FAFB";el.style.borderColor="#E5E7EB";el.style.color="#6B7280";}
  });
}
function saveRole(deptId,roleId){
  const d=data.departments.find(x=>x.id===deptId);
  const r=d.roles.find(x=>x.id===roleId);
  r.role=document.getElementById("er_role").value.trim()||r.role;
  r.name=document.getElementById("er_name").value.trim();
  r.group=document.getElementById("er_group").value.trim()||r.group;
  r.type=document.getElementById("er_type").value||r.type;
  save();render();closeOverlay();
}

/* ── ADD ROLE ── */
function openAddRole(deptId){
  const d=data.departments.find(x=>x.id===deptId);
  const groups=[...new Set(d.roles.map(r=>r.group).filter(Boolean))];
  const typePills=Object.entries(TYPE_CFG).map(([t,s])=>`<div class="type-pill" id="atp_${t}" onclick="selectAddType('${t}')" style="${t==='jr'?`background:${s.bg};border-color:${s.border};color:${s.text};`:''}">${s.icon} ${s.label}</div>`).join("");
  const groupOpts=groups.map(g=>`<option value="${g}">${g}</option>`).join("");
  document.getElementById("overlays").innerHTML=`
  <div class="overlay" onclick="if(event.target===this)closeOverlay()">
    <div class="modal">
      <div class="modal-hdr"><span class="modal-hdr-title">➕ Add New Position</span><button class="modal-close" onclick="closeOverlay()">×</button></div>
      <div class="modal-body">
        <div class="field"><label>Designation / Role Title</label><input id="ar_role" placeholder="e.g. Senior Engineer"/></div>
        <div class="field"><label>Employee Name (optional)</label><input id="ar_name" placeholder="e.g. Rajesh Kumar"/></div>
        <div class="field"><label>Role Type</label><div class="type-pills">${typePills}</div></div>
        <input type="hidden" id="ar_type" value="jr"/>
        <div class="field"><label>Group / Sub-team</label>
          <select id="ar_group" style="margin-bottom:8px;">
            <option value="">-- Select existing --</option>${groupOpts}
          </select>
          <input id="ar_newgroup" placeholder="Or type new group name…"/>
        </div>
        <div class="btn-row">
          <button class="btn-primary" onclick="saveAddRole('${deptId}')">➕ Add Position</button>
          <button class="btn-secondary" onclick="openDeptPanel('${deptId}')">Cancel</button>
        </div>
      </div>
    </div>
  </div>`;
}
function selectAddType(t){
  document.getElementById("ar_type").value=t;
  Object.entries(TYPE_CFG).forEach(([k,s])=>{
    const el=document.getElementById(`atp_${k}`);
    if(!el)return;
    if(k===t){el.style.background=s.bg;el.style.borderColor=s.border;el.style.color=s.text;}
    else{el.style.background="#F9FAFB";el.style.borderColor="#E5E7EB";el.style.color="#6B7280";}
  });
}
function saveAddRole(deptId){
  const role=document.getElementById("ar_role").value.trim();
  if(!role){alert("Please enter a role title.");return;}
  const name=document.getElementById("ar_name").value.trim();
  const type=document.getElementById("ar_type").value||"jr";
  const grpSel=document.getElementById("ar_group").value;
  const grpNew=document.getElementById("ar_newgroup").value.trim();
  const group=grpNew||grpSel||"Members";
  const d=data.departments.find(x=>x.id===deptId);
  d.roles.push({id:uid(),role,name,type,group});
  d.headcount++;
  save();render();openDeptPanel(deptId);
}

/* ── DELETE ROLE ── */
function deleteRole(deptId,roleId){
  if(!confirm("Delete this position? This cannot be undone."))return;
  const d=data.departments.find(x=>x.id===deptId);
  d.roles=d.roles.filter(r=>r.id!==roleId);
  d.headcount=Math.max(0,d.headcount-1);
  save();render();openDeptPanel(deptId);
}

/* ── ADD DEPT ── */
function openAddDept(){
  const swatches=DEPT_COLORS.map(c=>`<div class="color-swatch" id="cs_${c.replace('#','')}" style="background:${c};border:3px solid transparent;" onclick="selectDeptColor('${c}')"></div>`).join("");
  document.getElementById("overlays").innerHTML=`
  <div class="overlay" onclick="if(event.target===this)closeOverlay()">
    <div class="modal">
      <div class="modal-hdr"><span class="modal-hdr-title">➕ Add New Department</span><button class="modal-close" onclick="closeOverlay()">×</button></div>
      <div class="modal-body">
        <div class="field"><label>Department Name</label><input id="ad_label" placeholder="e.g. Quality Control"/></div>
        <div class="field"><label>Description</label><textarea id="ad_desc" placeholder="What does this department do?"></textarea></div>
        <div class="field"><label>Weekly Target</label><input id="ad_target" placeholder="e.g. 16 inspections / week"/></div>
        <div class="field"><label>Headcount</label><input id="ad_hc" type="number" value="0"/></div>
        <div class="field"><label>Colour</label><div class="color-row">${swatches}</div></div>
        <input type="hidden" id="ad_color" value="${DEPT_COLORS[0]}"/>
        <div class="btn-row">
          <button class="btn-primary" onclick="saveAddDept()">➕ Add Department</button>
          <button class="btn-secondary" onclick="closeOverlay()">Cancel</button>
        </div>
      </div>
    </div>
  </div>`;
  selectDeptColor(DEPT_COLORS[0]);
}
function selectDeptColor(c){
  document.getElementById("ad_color").value=c;
  DEPT_COLORS.forEach(x=>{
    const el=document.getElementById("cs_"+x.replace('#',''));
    if(el) el.style.border=`3px solid ${x===c?"#111":"transparent"}`;
    if(el) el.style.transform=x===c?"scale(1.2)":"none";
  });
}
function saveAddDept(){
  const label=document.getElementById("ad_label").value.trim();
  if(!label){alert("Please enter a department name.");return;}
  const num=String(data.departments.length+1).padStart(2,"0");
  data.departments.push({
    id:"dept_"+uid(),num,label,
    description:document.getElementById("ad_desc").value.trim()||"",
    weeklyTarget:document.getElementById("ad_target").value.trim()||"",
    headcount:+document.getElementById("ad_hc").value||0,
    color:document.getElementById("ad_color").value,
    roles:[]
  });
  save();render();closeOverlay();
}

/* ── DELETE DEPT ── */
function deleteDept(deptId){
  if(!confirm(`Delete this department? All positions will be lost.`))return;
  data.departments=data.departments.filter(d=>d.id!==deptId);
  save();render();closeOverlay();
}

/* ── DEPT PANEL ── */
function openDeptPanel(deptId){
  const dept=data.departments.find(x=>x.id===deptId);
  const groups={};
  dept.roles.forEach(r=>{const g=r.group||"Members";if(!groups[g])groups[g]=[];groups[g].push(r);});
  const typeCounts={};
  dept.roles.forEach(r=>{typeCounts[r.type]=(typeCounts[r.type]||0)+1;});
  let statsHTML=`<div class="stat-chip"><div class="stat-chip-val" style="color:${dept.color};">${dept.headcount}</div><div class="stat-chip-lbl">HEADCOUNT</div></div>`;
  Object.entries(typeCounts).forEach(([t,c])=>{
    const s=TYPE_CFG[t];
    statsHTML+=`<div class="stat-chip"><div class="stat-chip-val" style="color:${s?.text};">${c}</div><div class="stat-chip-lbl">${s?.label?.toUpperCase()}</div></div>`;
  });
  let groupsHTML="";
  Object.entries(groups).forEach(([g,roles])=>{
    groupsHTML+=`<div class="group-section">
      <div class="group-divider"><div class="divider-line"></div>${g.toUpperCase()} <span style="color:${dept.color};">(${roles.length})</span><div class="divider-line"></div></div>`;
    roles.forEach(r=>{
      const s=TYPE_CFG[r.type]||TYPE_CFG.tr;
      groupsHTML+=`<div class="role-list-item" onmouseover="this.style.background='${s.bg}';this.style.borderColor='${s.border}';" onmouseout="this.style.background='#FAFAFA';this.style.borderColor='#F3F4F6';">
        <div class="role-item-left">
          <div class="role-item-icon" style="background:${s.border};">${s.icon}</div>
          <div>
            <div class="role-item-title">${r.role}</div>
            ${r.name?`<div class="role-item-name">${r.name}</div>`:""}
            <span class="role-item-badge" style="background:${s.bg};color:${s.text};border:1px solid ${s.border}40;">${s.icon} ${s.label}</span>
          </div>
        </div>
        <div class="role-item-btns">
          <button style="background:#fff;border:1px solid ${s.border};color:${s.text};border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;" onclick="closeOverlay();openEditRole('${deptId}','${r.id}')">✏️ Edit</button>
          <button style="background:#FEF2F2;border:1px solid #FCA5A5;color:#DC2626;border-radius:8px;padding:7px 10px;font-size:13px;cursor:pointer;" onclick="deleteRole('${deptId}','${r.id}')">🗑️</button>
        </div>
      </div>`;
    });
    groupsHTML+=`</div>`;
  });

  document.getElementById("overlays").innerHTML=`
  <div class="overlay" onclick="if(event.target===this)closeOverlay()">
    <div class="panel">
      <div class="panel-hdr" style="background:linear-gradient(135deg,${dept.color}25,${dept.color}08);border-bottom:2px solid ${dept.color}30;">
        <div class="panel-top">
          <div style="display:flex;align-items:center;gap:14px;">
            <div class="panel-num" style="background:linear-gradient(135deg,${dept.color},${dept.color}90);box-shadow:0 4px 14px ${dept.color}50;">${dept.num}</div>
            <div><div class="panel-title">${dept.label}</div><div class="panel-sub">${dept.headcount} people · ${dept.roles.length} positions</div></div>
          </div>
          <div class="panel-actions">
            <button style="background:#fff;border:1.5px solid ${dept.color}60;color:${dept.color};border-radius:9px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;" onclick="closeOverlay();openEditDept('${deptId}')">✏️ Edit</button>
            <button style="background:#FEF2F2;border:1.5px solid #FCA5A5;color:#DC2626;border-radius:9px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;" onclick="deleteDept('${deptId}')">🗑️ Delete</button>
            <button style="background:#F3F4F6;border:none;border-radius:9px;width:36px;height:36px;cursor:pointer;font-size:20px;color:#6B7280;" onclick="closeOverlay()">×</button>
          </div>
        </div>
        <div class="stat-chips">${statsHTML}</div>
      </div>
      <div class="panel-body">
        <div class="desc-box" style="border-left:3px solid ${dept.color};">${dept.description}</div>
        <div class="target-box">
          <div style="font-size:22px;">🎯</div>
          <div>
            <div style="font-size:11px;font-weight:700;color:#C8962E;letter-spacing:1px;margin-bottom:2px;">WEEKLY TARGET</div>
            <div style="font-size:14px;font-weight:600;color:#111827;">${dept.weeklyTarget}</div>
          </div>
        </div>
        <button class="add-pos-btn" style="background:linear-gradient(135deg,${dept.color}15,${dept.color}05);border:2px dashed ${dept.color}60;color:${dept.color};" onclick="closeOverlay();openAddRole('${deptId}')">
          ➕ Add New Position to ${dept.label}
        </button>
        ${groupsHTML}
      </div>
    </div>
  </div>`;
}

function resetData(){
  if(!confirm("Reset to default OBS? All your changes will be lost."))return;
  data=JSON.parse(JSON.stringify(DEFAULT_DATA));
  save();render();
}

render();
</script>
</body>
</html>
